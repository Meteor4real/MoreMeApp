appId: com.meteor4real.moreme
productName: MoreMe
directories:
  output: release
  buildResources: build
npmRebuild: false
buildDependenciesFromSource: false
files:
  - dist
  - dist-electron
  - package.json
asarUnpack:
  - "**/node_modules/@homebridge/node-pty-prebuilt-multiarch/**"
  - "**/node_modules/node-llama-cpp/**"
  - "**/node_modules/@node-llama-cpp/**"
win:
  target:
    - nsis
    - zip
  icon: build/icon.ico
  artifactName: "MoreMe-win-${arch}.${ext}"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: "MoreMe-Setup.${ext}"
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  category: public.app-category.productivity
  icon: build/icon.icns
  artifactName: "MoreMe-mac-${arch}.${ext}"
linux:
  target:
    - AppImage
    - deb
  category: Office
  icon: build/icon.png
  maintainer: "MoreMe <hub@example.com>"
  artifactName: "MoreMe-linux.${ext}"
publish: null
