name: Release

on:
  # Fires when a tag is pushed via git.
  push:
    tags:
      - "v*"
  # Fires when a release is created/published through the GitHub web UI.
  # This is the important one: creating a release in the UI does NOT
  # reliably fire the push-tag event above, which is why earlier releases
  # ended up with zero attached installers.
  release:
    types: [published]
  # Manual run from the Actions tab.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # 45 min per platform — Windows + node-llama-cpp is the slow one. If
    # something hangs past this, we fail with logs instead of hanging silent.
    timeout-minutes: 45
    steps:
      # Check out the exact ref we're releasing. For a published release or a
      # pushed tag that's the tag's commit; for a manual run it's the tag
      # input. fetch-depth:0 so the guard below can compare against main.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name || github.ref_name }}
          fetch-depth: 0

      # GUARD: never build a stale commit. The bug that shipped an old v3.0.0
      # was a tag pointing at a commit that predated the merged work. This
      # fails the run loudly if the commit we're about to build is not the
      # current tip of main — re-create the tag at main's HEAD and re-run.
      - name: Verify the release commit is main's HEAD
        shell: bash
        run: |
          set -e
          TAG="${{ github.event.inputs.tag || github.event.release.tag_name || github.ref_name }}"
          BUILD_SHA="$(git rev-parse HEAD)"
          git fetch --no-tags origin main
          MAIN_SHA="$(git rev-parse FETCH_HEAD)"
          echo "Releasing tag : $TAG"
          echo "Build commit  : $BUILD_SHA"
          echo "main HEAD     : $MAIN_SHA"
          {
            echo "### Release commit check"
            echo ""
            echo "- Tag: \`$TAG\`"
            echo "- Build commit: \`$BUILD_SHA\`"
            echo "- main HEAD: \`$MAIN_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$BUILD_SHA" != "$MAIN_SHA" ]; then
            echo "::error::Tag '$TAG' points at $BUILD_SHA but main is at $MAIN_SHA. This would ship a STALE build."
            echo "::error::Delete and re-create the tag at main's current HEAD (or release from main), then re-run."
            echo ":x: **Aborted — tag is not at main HEAD. Re-tag from main and re-run.**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo ":white_check_mark: Tag matches main HEAD — building the real thing." >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (with retry — node-llama-cpp postinstall can flake)
        shell: bash
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "::group::npm ci attempt $attempt"
            if npm ci --no-audit --no-fund; then
              echo "::endgroup::"
              echo "npm ci succeeded on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::npm ci failed on attempt $attempt — purging cache + retrying"
            npm cache clean --force || true
            rm -rf node_modules apps/*/node_modules packages/*/node_modules 2>/dev/null || true
            sleep 15
          done
          echo "::error::npm ci failed 3 times. node-llama-cpp's prebuilt-binary download likely 5xx'd."
          exit 1

      - name: Generate icons
        run: npm run icons --workspace=@nchub/desktop

      - name: Package desktop app
        run: npm run package:desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # Always-on summary of what landed in the release dir, even on
      # failure — gives us a postmortem in the Actions run page without
      # digging through electron-builder's output.
      - name: List build output
        if: always()
        shell: bash
        run: |
          set +e
          d="apps/desktop/release"
          {
            echo "## Build summary on ${{ matrix.os }}"
            echo ""
            if [ ! -d "$d" ]; then
              echo "**release/ dir does not exist** — packaging produced nothing."
              exit 0
            fi
            echo "**Files in $d:**"
            echo ""
            ls -la "$d" 2>&1 | sed 's/^/    /'
            echo ""
            count=$(ls -1 "$d" 2>/dev/null | wc -l)
            echo "Total: $count items"
          } | tee -a "$GITHUB_STEP_SUMMARY"
          # Fail the job ONLY if the dir is missing or empty (so partial wins still upload).
          [ -d "$d" ] && [ -n "$(ls -A "$d" 2>/dev/null)" ]

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.event.release.tag_name || github.ref_name }}
          draft: false
          prerelease: false
          # Don't fail the whole job if a glob is empty — let other globs
          # still upload what they can. The build-output step above already
          # fails when nothing was produced.
          fail_on_unmatched_files: false
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.zip

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.event.release.tag_name || github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.event.release.tag_name || github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb

      # Final per-job status pinned to the Actions run page.
      - name: Run summary
        if: always()
        shell: bash
        run: |
          {
            echo ""
            echo "### Status on ${{ matrix.os }}"
            echo ""
            if [ -d "apps/desktop/release" ] && [ -n "$(ls -A apps/desktop/release 2>/dev/null)" ]; then
              echo ":white_check_mark: Built and uploaded to **${{ github.event.inputs.tag || github.ref_name }}**."
            else
              echo ":x: Nothing built. Inspect the **Install** / **Package desktop app** step above for the failure."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
